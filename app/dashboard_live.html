<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>반려견 증상 매칭 · Vet Match</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" crossorigin="anonymous"></script>
<style>
:root {
  --bg: #fafafa; --bg-elev: #ffffff; --bg-soft: #f4f4f5; --bg-hover: #f0f0f2;
  --border: #e7e7ea; --border-strong: #d4d4d8;
  --text: #09090b; --text-muted: #52525b; --text-subtle: #a1a1aa;
  --accent-h: 258;
  --accent: oklch(0.55 0.22 var(--accent-h));
  --accent-strong: oklch(0.46 0.24 var(--accent-h));
  --accent-soft: oklch(0.96 0.04 var(--accent-h));
  --accent-ink: oklch(0.28 0.12 var(--accent-h));
  --accent-fg: #ffffff;
  --compare: oklch(0.58 0.02 260); --compare-soft: oklch(0.96 0.005 260);
  --success: oklch(0.6 0.15 155); --warning: oklch(0.72 0.17 75); --danger: oklch(0.58 0.21 25);
  --accent-2: oklch(0.65 0.18 210); --accent-3: oklch(0.7 0.15 155);
  --accent-4: oklch(0.72 0.17 75); --accent-5: oklch(0.62 0.19 25);
  --radius-sm: 6px; --radius: 10px; --radius-lg: 14px;
  --shadow-sm: 0 1px 2px rgba(9,9,11,.04);
  --shadow: 0 1px 3px rgba(9,9,11,.06), 0 1px 2px rgba(9,9,11,.04);
  --shadow-lg: 0 8px 24px rgba(9,9,11,.08), 0 2px 6px rgba(9,9,11,.04);
  --font-sans: "Pretendard Variable","Pretendard","Inter",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --font-mono: "JetBrains Mono","SF Mono",ui-monospace,Menlo,monospace;
}
:root[data-theme="dark"] {
  --bg: #09090b; --bg-elev: #111114; --bg-soft: #16161a; --bg-hover: #1c1c21;
  --border: #26262b; --border-strong: #34343a;
  --text: #fafafa; --text-muted: #a1a1aa; --text-subtle: #71717a;
  --accent: oklch(0.68 0.2 var(--accent-h)); --accent-strong: oklch(0.78 0.17 var(--accent-h));
  --accent-soft: oklch(0.24 0.1 var(--accent-h)); --accent-ink: oklch(0.88 0.1 var(--accent-h));
  --compare: oklch(0.55 0.02 260); --compare-soft: oklch(0.22 0.01 260);
  --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
  --shadow: 0 1px 3px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.3);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.4), 0 2px 6px rgba(0,0,0,.3);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
body {
  font-family: var(--font-sans); background: var(--bg); color: var(--text);
  font-size: 14px; line-height: 1.5;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }

.app { display: grid; grid-template-columns: 248px 1fr; height: 100vh; overflow: hidden; }

.sidebar {
  background: var(--bg-elev); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; height: 100vh; overflow-y: auto;
}
.sidebar-brand {
  display: flex; align-items: center; gap: 10px;
  padding: 18px 18px 14px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-brand .logo {
  width: 30px; height: 30px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
  display: grid; place-items: center; color: var(--accent-fg);
  font-weight: 700; font-size: 14px;
  box-shadow: inset 0 -1px 0 rgba(0,0,0,.2), var(--shadow-sm);
}
.sidebar-brand .title { font-weight: 600; font-size: 14px; letter-spacing: -0.01em; }
.sidebar-brand .sub { font-size: 11px; color: var(--text-subtle); font-family: var(--font-mono); margin-top: 2px; }
.sidebar-section {
  padding: 18px 12px 6px; font-size: 11px; font-weight: 500; color: var(--text-subtle);
  text-transform: uppercase; letter-spacing: 0.08em; font-family: var(--font-mono); flex-shrink: 0;
}
.nav { display: flex; flex-direction: column; padding: 0 8px; gap: 1px; flex-shrink: 0; }
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 10px;
  border-radius: var(--radius-sm); color: var(--text-muted); font-size: 13.5px;
  font-weight: 500; text-align: left; width: 100%; transition: background .1s, color .1s;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text); }
.nav-item.active { background: var(--accent-soft); color: var(--accent-ink); }
.nav-item .num { font-family: var(--font-mono); font-size: 11px; color: var(--text-subtle); width: 14px; }
.nav-item.active .num { color: var(--accent); }
.nav-item .label { flex: 1; }
.nav-item .chev { opacity: 0; color: var(--text-subtle); }
.nav-item.active .chev { opacity: 1; color: var(--accent); }
.sidebar-foot {
  margin-top: auto; padding: 12px; border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 10px; flex-shrink: 0;
}
.sidebar-foot .kbd-row {
  display: flex; justify-content: space-between; font-size: 11px;
  color: var(--text-subtle); font-family: var(--font-mono);
}
.kbd {
  display: inline-block; padding: 2px 6px; border: 1px solid var(--border);
  border-bottom-width: 2px; border-radius: 4px; background: var(--bg-soft);
  color: var(--text-muted); font-size: 10.5px; font-family: var(--font-mono); line-height: 1;
}

.main { display: flex; flex-direction: column; min-width: 0; overflow-y: auto; height: 100vh; }
.topbar {
  height: 56px; border-bottom: 1px solid var(--border); background: var(--bg-elev);
  display: flex; align-items: center; padding: 0 24px; gap: 16px;
  position: sticky; top: 0; z-index: 5; flex-shrink: 0;
}
.breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); }
.breadcrumb .sep { color: var(--text-subtle); }
.breadcrumb .curr { color: var(--text); font-weight: 600; }
.topbar-spacer { flex: 1; }
.pill {
  display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px;
  border: 1px solid var(--border); border-radius: 999px; font-size: 12px;
  color: var(--text-muted); background: var(--bg-soft); font-family: var(--font-mono);
}
.pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
.pill.live .dot { background: var(--success); box-shadow: 0 0 0 3px color-mix(in oklch, var(--success) 25%, transparent); }
.icon-btn {
  width: 34px; height: 34px; display: grid; place-items: center;
  border-radius: 8px; color: var(--text-muted); border: 1px solid transparent;
}
.icon-btn:hover { background: var(--bg-hover); color: var(--text); border-color: var(--border); }
.content { padding: 24px 28px 80px; max-width: 1360px; width: 100%; }
.page-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 24px; margin-bottom: 20px;
}
.page-title { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 4px; }
.page-sub { font-size: 13px; color: var(--text-muted); margin: 0; }

.btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px;
  border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
  border: 1px solid var(--border-strong); background: var(--bg-elev); color: var(--text);
  transition: background .1s, border-color .1s;
}
.btn:hover { background: var(--bg-hover); }
.btn-primary { background: var(--accent); color: var(--accent-fg); border-color: transparent; }
.btn-primary:hover { background: var(--accent-strong); }
.btn-ghost { border-color: transparent; background: transparent; color: var(--text-muted); }
.btn-ghost:hover { background: var(--bg-hover); color: var(--text); }
.btn-sm { padding: 5px 10px; font-size: 12px; }

.card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
.card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 14px; }
.card-title { font-size: 13px; font-weight: 600; letter-spacing: -0.005em; margin: 0; }
.card-sub { font-size: 12px; color: var(--text-subtle); margin: 2px 0 0; font-family: var(--font-mono); }

.metric-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
.metric {
  background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px 18px; display: flex; flex-direction: column; gap: 6px; position: relative; overflow: hidden;
}
.metric .label { font-size: 11.5px; color: var(--text-muted); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.06em; }
.metric .value { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; color: var(--text); }
.metric .foot { display: flex; gap: 6px; align-items: center; font-size: 11.5px; color: var(--text-subtle); font-family: var(--font-mono); margin-top: 2px; }
.metric .delta { display: inline-flex; align-items: center; gap: 3px; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; font-family: var(--font-mono); }
.metric .delta.up { color: var(--success); background: color-mix(in oklch, var(--success) 12%, transparent); }
.metric .delta.down { color: var(--danger); background: color-mix(in oklch, var(--danger) 12%, transparent); }

.search-layout { display: grid; grid-template-columns: 1fr 280px; gap: 20px; }
.search-panel { background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
.search-input-wrap {
  position: relative; display: flex; align-items: flex-start; gap: 10px;
  border: 1.5px solid var(--border-strong); border-radius: var(--radius);
  padding: 12px 14px; background: var(--bg); transition: border-color .1s, box-shadow .1s;
}
.search-input-wrap:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 18%, transparent);
}
.search-input-wrap .glyph { color: var(--text-subtle); padding-top: 3px; }
.search-input { flex: 1; border: none; outline: none; background: transparent; font-size: 14.5px; line-height: 1.55; resize: none; min-height: 22px; max-height: 120px; }
.search-input::placeholder { color: var(--text-subtle); }
.search-foot { margin-top: 12px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.chips { display: flex; gap: 6px; flex-wrap: wrap; }
.chip { padding: 4px 10px; border-radius: 999px; font-size: 12px; color: var(--text-muted); background: var(--bg-soft); border: 1px solid var(--border); transition: all .1s; }
.chip:hover { background: var(--bg-hover); color: var(--text); border-color: var(--border-strong); }
.empty-state { padding: 60px 20px 40px; text-align: center; border-top: 1px dashed var(--border); margin-top: 22px; }
.empty-state .big-icon { width: 44px; height: 44px; border-radius: 12px; background: var(--accent-soft); color: var(--accent-ink); display: inline-grid; place-items: center; margin-bottom: 14px; }
.empty-state h3 { margin: 0 0 6px; font-size: 15px; font-weight: 600; }
.empty-state p { color: var(--text-muted); font-size: 13px; max-width: 520px; margin: 0 auto 22px; }
.example-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(260px,1fr)); gap: 8px; max-width: 720px; margin: 0 auto; text-align: left; }
.example-pill { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-elev); font-size: 13px; color: var(--text); transition: all .1s; }
.example-pill:hover { border-color: var(--accent); background: var(--accent-soft); color: var(--accent-ink); }
.example-pill .arrow { margin-left: auto; color: var(--text-subtle); }
.example-pill:hover .arrow { color: var(--accent); }

.settings-card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; gap: 18px; position: sticky; top: 80px; }
.setting-group .g-label { font-size: 11px; font-weight: 500; color: var(--text-subtle); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.seg { display: flex; background: var(--bg-soft); border: 1px solid var(--border); border-radius: 8px; padding: 3px; gap: 2px; }
.seg-btn { flex: 1; padding: 6px 8px; font-size: 12px; border-radius: 5px; color: var(--text-muted); font-weight: 500; transition: all .1s; }
.seg-btn.active { background: var(--bg-elev); color: var(--text); box-shadow: var(--shadow-sm); }
.seg.stack { flex-direction: column; }
.slider-row { display: flex; align-items: center; gap: 10px; }
.slider-row input[type="range"] { flex: 1; accent-color: var(--accent); }
.slider-row .val { font-family: var(--font-mono); font-size: 12px; color: var(--text); min-width: 18px; text-align: right; }

.results-wrap { margin-top: 22px; }
.results-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.results-title { font-size: 13px; font-weight: 600; }
.results-title .q-preview { color: var(--text-muted); font-weight: 400; margin-left: 6px; }
.compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.model-col { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
.model-col-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-radius: var(--radius); font-size: 12.5px; font-weight: 600; border: 1px solid var(--border); }
.model-col-head .left { display: flex; align-items: center; gap: 8px; }
.model-col-head .swatch { width: 10px; height: 10px; border-radius: 3px; }
.model-col-head .subtle { font-weight: 400; font-size: 11.5px; color: var(--text-subtle); font-family: var(--font-mono); }
.model-col.bert .model-col-head { background: var(--accent-soft); color: var(--accent-ink); border-color: transparent; }
.model-col.bert .model-col-head .swatch { background: var(--accent); }
.model-col.tfidf .model-col-head { background: var(--compare-soft); color: var(--text); }
.model-col.tfidf .model-col-head .swatch { background: var(--compare); }
.result-card { border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-elev); overflow: hidden; transition: border-color .1s; }
.result-card:hover { border-color: var(--border-strong); }
.result-card.open { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 12%, transparent); }
.result-row { display: grid; grid-template-columns: 28px 1fr auto; align-items: flex-start; gap: 10px; padding: 12px 14px; cursor: pointer; }
.result-row .rank { font-family: var(--font-mono); font-size: 11px; color: var(--text-subtle); margin-top: 3px; }
.result-card.open .rank { color: var(--accent); }
.result-body { min-width: 0; }
.result-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
.tag { display: inline-flex; padding: 2px 7px; border-radius: 4px; font-size: 10.5px; font-weight: 500; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.04em; border: 1px solid var(--border); color: var(--text-muted); background: var(--bg-soft); }
.tag.life-puppy  { color: oklch(0.48 0.16 40);  background: oklch(0.96 0.04 40); border-color: transparent; }
.tag.life-adult  { color: oklch(0.42 0.14 200); background: oklch(0.96 0.03 200); border-color: transparent; }
.tag.life-senior { color: oklch(0.4 0.1 280);   background: oklch(0.95 0.04 280); border-color: transparent; }
:root[data-theme="dark"] .tag.life-puppy  { color: oklch(0.82 0.14 40);  background: oklch(0.28 0.08 40); }
:root[data-theme="dark"] .tag.life-adult  { color: oklch(0.82 0.12 200); background: oklch(0.25 0.06 200); }
:root[data-theme="dark"] .tag.life-senior { color: oklch(0.82 0.1 280);  background: oklch(0.26 0.07 280); }
.tag.dept { color: var(--text); background: var(--bg-soft); }
.tag.disease { color: var(--accent-ink); background: var(--accent-soft); border-color: transparent; }
.result-q { font-size: 13px; line-height: 1.5; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.result-card.open .result-q { -webkit-line-clamp: unset; display: block; }
.sim-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; min-width: 78px; }
.sim-val { font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
.sim-bar { width: 64px; height: 4px; background: var(--bg-soft); border-radius: 2px; overflow: hidden; }
.sim-bar .fill { height: 100%; background: var(--accent); border-radius: 2px; }
.model-col.tfidf .sim-bar .fill { background: var(--compare); }
.result-expand { padding: 0 14px 14px; border-top: 1px dashed var(--border); margin-top: 4px; }
.result-expand .block-label { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-subtle); text-transform: uppercase; letter-spacing: 0.08em; margin: 14px 0 6px; }
.result-expand .q-text { font-size: 13px; line-height: 1.6; color: var(--text); margin: 0; }
.result-expand .a-text { font-size: 13px; line-height: 1.7; color: var(--text-muted); padding: 10px 12px; background: var(--bg-soft); border-radius: var(--radius-sm); margin: 0; white-space: pre-wrap; }

.table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.table th, .table td { text-align: left; padding: 9px 12px; border-bottom: 1px solid var(--border); font-variant-numeric: tabular-nums; }
.table th { color: var(--text-subtle); font-weight: 500; font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; background: var(--bg-soft); }
.table tbody tr:last-child td { border-bottom: none; }
.table td.num { font-family: var(--font-mono); text-align: right; }
.table td.strong { font-weight: 600; color: var(--text); }

.chart-ph {
  border: 1px dashed var(--border-strong); border-radius: var(--radius);
  background: repeating-linear-gradient(45deg, transparent 0 8px, color-mix(in oklch, var(--border) 30%, transparent) 8px 9px), var(--bg-soft);
  padding: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 6px; min-height: 240px;
}
.chart-ph .ph-title { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
.chart-ph .ph-file { font-family: var(--font-mono); font-size: 11px; color: var(--text-subtle); }
.chart-ph .ph-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 10.5px; font-family: var(--font-mono); background: var(--bg-elev); border: 1px solid var(--border); color: var(--text-subtle); margin-top: 4px; }

.bar-row { display: grid; grid-template-columns: 72px 1fr 60px; align-items: center; gap: 10px; padding: 6px 0; }
.bar-row .bar-label { font-size: 12px; color: var(--text); font-family: var(--font-mono); }
.bar-row .bar-val { font-family: var(--font-mono); font-size: 12px; color: var(--text); text-align: right; font-variant-numeric: tabular-nums; }
.bar-track { position: relative; height: 22px; background: var(--bg-soft); border-radius: 4px; overflow: hidden; }
.bar-fill { position: absolute; top: 0; bottom: 0; left: 0; border-radius: 4px; transition: width .6s cubic-bezier(.2,.8,.2,1); }
.bar-fill.bert { background: var(--accent); }
.bar-fill.tfidf { background: var(--compare); }
.bar-fill.solid { background: var(--accent); }

.group-bars { display: flex; flex-direction: column; gap: 18px; padding: 6px 4px; }
.group-item { display: grid; grid-template-columns: 72px 1fr; align-items: center; gap: 12px; }
.group-item .g-name { font-size: 13px; font-weight: 600; font-family: var(--font-mono); }
.group-bars-inner { display: flex; flex-direction: column; gap: 6px; }
.gb { display: grid; grid-template-columns: 52px 1fr 60px; align-items: center; gap: 10px; }
.gb .gb-label { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
.gb .gb-val { font-family: var(--font-mono); font-size: 12px; text-align: right; font-variant-numeric: tabular-nums; color: var(--text); }

.donut-wrap { display: grid; grid-template-columns: 200px 1fr; gap: 20px; align-items: center; }
.donut { width: 200px; height: 200px; position: relative; }
.donut svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.donut .center { position: absolute; inset: 0; display: grid; place-items: center; text-align: center; }
.donut .center .big { font-size: 22px; font-weight: 600; font-family: var(--font-mono); letter-spacing: -0.01em; }
.donut .center .small { font-size: 11px; color: var(--text-subtle); font-family: var(--font-mono); }

<script type="text/babel">
const { useState, useEffect, useRef } = React;

function SearchPage({ settings, setSettings }) {
  const data = window.APP_DATA;
  const [query, setQuery] = useState("");
  const [searchState, setSearchState] = useState("empty");
  const [openIdx, setOpenIdx] = useState({ bert: 0, tfidf: null });
  const textareaRef = useRef(null);

  const runSearch = (q) => {
    if (!q || !q.trim()) return;
    setQuery(q);
    setSearchState("loading");
    setTimeout(() => setSearchState("results"), 700);
  };
  const reset = () => { setQuery(""); setSearchState("empty"); setOpenIdx({ bert: 0, tfidf: null }); };
  const handleExampleClick = (text) => {
    if (textareaRef.current) textareaRef.current.value = text;
    runSearch(text);
  };
  const resultsCount = settings.topK;
  const lifeTag = (life) => ({ "자견":"life-puppy","성견":"life-adult","노령견":"life-senior" }[life] || "");

  return (
    <div className="search-layout">
      <div className="col-main">
        <div className="search-panel">
          <div className="search-input-wrap">
            <div className="glyph"><Icon name="search" size={18} /></div>
            <textarea ref={textareaRef} className="search-input"
              placeholder="강아지 증상을 자연스럽게 입력하세요. 예: 강아지가 밥을 안 먹고 자꾸 토해요. 3일째 기운이 없어요."
              rows={2} defaultValue={query}
              onKeyDown={(e) => { if (e.key==="Enter"&&!e.shiftKey){e.preventDefault();runSearch(e.currentTarget.value);} }} />
          </div>
          <div className="search-foot">
            <div className="chips">
              <span className="muted mono" style={{fontSize:11}}>Quick picks</span>
              {data.sampleSuggestions.slice(0,3).map((s)=>(
                <button key={s} className="chip" onClick={()=>handleExampleClick(s)}>{s}</button>
              ))}
            </div>
            <div className="hstack">
              {searchState!=="empty"&&(<button className="btn btn-ghost btn-sm" onClick={reset}><Icon name="close" size={14}/> 초기화</button>)}
              <button className="btn btn-primary" onClick={()=>runSearch(textareaRef.current?.value||query)}><Icon name="search" size={14}/> 유사 사례 검색</button>
            </div>
          </div>
          {searchState==="empty"&&(
            <div className="empty-state">
              <div className="big-icon"><Icon name="bot" size={22}/></div>
              <h3>증상을 입력해 유사 Q&A를 찾아보세요</h3>
              <p>21,604건의 수의사 답변 말뭉치에서 TF-IDF와 BERT 두 모델로 동시에 검색합니다.<br/>어떤 모델이 더 적합한 사례를 찾는지 나란히 비교해보세요.</p>
              <div className="example-grid">
                {data.sampleSuggestions.map((s,i)=>(
                  <button key={s} className="example-pill" onClick={()=>handleExampleClick(s)}>
                    <span className="mono muted" style={{fontSize:11}}>{String(i+1).padStart(2,"0")}</span>
                    <span style={{flex:1}}>{s}</span>
                    <span className="arrow"><Icon name="arrow" size={14}/></span>
                  </button>
                ))}
              </div>
            </div>
          )}
          {searchState==="loading"&&(
            <div className="loading"><span className="dot"/><span className="dot"/><span className="dot"/><span style={{marginLeft:8}}>두 모델에서 유사 문서 검색 중…</span></div>
          )}
        </div>
        {searchState==="results"&&(
          <div className="results-wrap">
            <div className="results-head">
              <div className="results-title">검색 결과<span className="q-preview">· "{query.length>40?query.slice(0,40)+"…":query}"</span></div>
              <div className="hstack">
                <span className="pill"><Icon name="clock" size={11}/><span>TF-IDF 0.18s</span><span className="sep-dot">·</span><span>BERT 0.42s</span></span>
              </div>
            </div>
            <div className={settings.mode==="compare"?"compare-grid":""}>
              {(settings.mode==="compare"||settings.mode==="tfidf")&&(
                <div className="model-col tfidf">
                  <div className="model-col-head">
                    <div className="left"><span className="swatch"/><span>TF-IDF</span><span className="subtle">scikit-learn · 키워드 기반</span></div>
                    <span className="subtle">top-{resultsCount}</span>
                  </div>
                  {data.results.tfidf.slice(0,resultsCount).map((r,i)=>(
                    <ResultCard key={i} r={r} isOpen={openIdx.tfidf===i} model="tfidf"
                      onToggle={()=>setOpenIdx({...openIdx,tfidf:openIdx.tfidf===i?null:i})} lifeTag={lifeTag}/>
                  ))}
                </div>
              )}
              {(settings.mode==="compare"||settings.mode==="bert")&&(
                <div className="model-col bert">
                  <div className="model-col-head">
                    <div className="left"><span className="swatch"/><span>Sentence-BERT</span><span className="subtle">ko-sroberta · 의미 기반</span></div>
                    <span className="subtle">top-{resultsCount}</span>
                  </div>
                  {data.results.bert.slice(0,resultsCount).map((r,i)=>(
                    <ResultCard key={i} r={r} isOpen={openIdx.bert===i} model="bert"
                      onToggle={()=>setOpenIdx({...openIdx,bert:openIdx.bert===i?null:i})} lifeTag={lifeTag}/>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}
      </div>
      <aside>
        <div className="settings-card">
          <div className="setting-group">
            <div className="g-label">검색 모드 · Mode</div>
            <div className="seg stack">
              {[["compare","TF-IDF vs BERT 비교"],["bert","BERT 단독"],["tfidf","TF-IDF 단독"]].map(([k,l])=>(
                <button key={k} className={"seg-btn "+(settings.mode===k?"active":"")} onClick={()=>setSettings({...settings,mode:k})}>{l}</button>
              ))}
            </div>
          </div>
          <div className="setting-group">
            <div className="g-label">결과 개수 · Top-K</div>
            <div className="slider-row">
              <input type="range" min="1" max="5" value={settings.topK} onChange={(e)=>setSettings({...settings,topK:+e.target.value})}/>
              <span className="val">{settings.topK}</span>
            </div>
          </div>
          <div className="setting-group">
            <div className="g-label">생애주기 · Lifecycle</div>
            <div className="seg stack">
              {[["all","전체"],["puppy","자견"],["adult","성견"],["senior","노령견"]].map(([k,l])=>(
                <button key={k} className={"seg-btn "+(settings.life===k?"active":"")} onClick={()=>setSettings({...settings,life:k})}>{l}</button>
              ))}
            </div>
          </div>
          <div className="setting-group">
            <div className="g-label">모델 정보</div>
            <div style={{fontSize:11.5,lineHeight:1.7,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>
              <div>· TF-IDF (sklearn)</div><div>· ko-sroberta-multitask</div>
              <div>· corpus: 19,205 docs</div><div>· eval: 2,399 docs</div>
            </div>
          </div>
        </div>
      </aside>
    </div>
  );
}

function ResultCard({ r, isOpen, model, onToggle, lifeTag }) {
  return (
    <div className={"result-card "+(isOpen?"open":"")}>
      <div className="result-row" onClick={onToggle}>
        <div className="rank">#{r.rank}</div>
        <div className="result-body">
          <div className="result-meta">
            <span className={"tag "+lifeTag(r.lifecycle)}>{r.lifecycle}</span>
            <span className="tag dept">{r.dept}</span>
            <span className="tag disease">{r.disease}</span>
          </div>
          <div className="result-q">{r.q}</div>
        </div>
        <div className="sim-wrap">
          <div className="sim-val">{r.sim.toFixed(4)}</div>
          <div className="sim-bar"><div className="fill" style={{width:(r.sim*100)+"%"}}/></div>
        </div>
      </div>
      {isOpen&&(
        <div className="result-expand">
          <div className="block-label">질문 · Question</div>
          <p className="q-text">{r.q}</p>
          <div className="block-label">수의사 답변 · Veterinarian</div>
          <p className="a-text">{r.a}</p>
        </div>
      )}
    </div>
  );
}
window.SearchPage = SearchPage;
</script>

function DonutChart({ items }) {
  const colors = ["var(--accent)","var(--accent-2)","var(--accent-3)","var(--accent-4)","var(--accent-5)"];
  const total = items.reduce((s,x)=>s+x.pct,0);
  const R=68, C=2*Math.PI*R;
  let offset=0;
  return (
    <div className="donut">
      <svg viewBox="0 0 200 200">
        <circle cx="100" cy="100" r={R} fill="none" stroke="var(--bg-soft)" strokeWidth="22"/>
        {items.map((x,i)=>{
          const len=(x.pct/total)*C;
          const el=<circle key={x.key} cx="100" cy="100" r={R} fill="none" stroke={colors[i]} strokeWidth="22" strokeDasharray={`${len} ${C-len}`} strokeDashoffset={-offset}/>;
          offset+=len; return el;
        })}
      </svg>
      <div className="center"><div><div className="big">{items[0].pct}%</div><div className="small">내과 우세</div></div></div>
    </div>
  );
}

function PlotlyChart({ fig, height=280 }) {
  const ref = React.useRef(null);

  React.useEffect(() => {
    if (!ref.current || !window.Plotly || !fig) return;
    const layout = Object.assign({
      paper_bgcolor: "rgba(0,0,0,0)", plot_bgcolor: "rgba(0,0,0,0)",
      font: { family: "'Pretendard Variable','Inter',sans-serif", size: 12, color: "#09090b" },
      hoverlabel: { bgcolor: "#ffffff", font: { size: 12 } },
      autosize: true,
    }, fig.layout || {});
    window.Plotly.react(ref.current, fig.data || [], layout, { responsive: true, displayModeBar: false });
    return () => { try { window.Plotly.purge(ref.current); } catch(e){} };
  }, [fig]);

  if (!fig) return (
    <div className="chart-ph" style={{minHeight: height}}>
      <div className="ph-title">데이터 로딩 중...</div>
      <span className="ph-badge"><Icon name="sparkles" size={10}/>plotly</span>
    </div>
  );
  return <div ref={ref} style={{height, width:"100%"}}/>;
}

function EvalQueryRow({ q, isOpen, onToggle, viewMode }) {
  const bertResults = makeMiniResults(q,"bert");
  const tfidfResults = makeMiniResults(q,"tfidf");
  return (
    <div className={"q-row "+(isOpen?"open":"")}>
      <div className="q-head" onClick={onToggle}>
        <span className="q-id">[{q.id}]</span>
        <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}>
          <div className="q-tags">
            <span className={"tag "+lifeTag2(q.life)}>{q.life}</span>
            <span className="tag dept">{q.dept}</span>
            <span className="tag disease">{q.disease}</span>
          </div>
          <span className="sep-dot">·</span>
          <span className="q-title">{q.title}</span>
        </div>
        <span className="q-chev"><Icon name="chev" size={14}/></span>
      </div>
      {isOpen&&(
        <div className="q-body">
          {(viewMode==="tfidf"||viewMode==="both")&&(
            <div>
              <div className="hstack" style={{marginBottom:8}}>
                <span className="mono" style={{fontSize:11,color:"var(--text-subtle)"}}>TF-IDF · top 5</span>
                <span className="mono" style={{fontSize:11,color:"var(--success)",marginLeft:"auto"}}>hit: {tfidfResults.filter(r=>r.correct).length}/5</span>
              </div>
              {tfidfResults.map((r,i)=><MiniResult key={i} r={r}/>)}
            </div>
          )}
          {(viewMode==="bert"||viewMode==="both")&&(
            <div>
              <div className="hstack" style={{marginBottom:8}}>
                <span className="mono" style={{fontSize:11,color:"var(--accent)"}}>BERT · top 5</span>
                <span className="mono" style={{fontSize:11,color:"var(--success)",marginLeft:"auto"}}>hit: {bertResults.filter(r=>r.correct).length}/5</span>
              </div>
              {bertResults.map((r,i)=><MiniResult key={i} r={r}/>)}
            </div>
          )}
        </div>
      )}
    </div>
  );
}
function MiniResult({ r }) {
  return (
    <div className={"mini-result "+(r.correct?"correct":"")}>
      <span className="rnk">#{r.rank}</span>
      <div className="body"><span style={{color:"var(--text-muted)",fontSize:11,marginRight:6}}>{r.dept}·{r.disease}</span><span>{r.q}</span></div>
      <div className="hstack" style={{gap:6}}><span className="sim-num">{r.sim.toFixed(3)}</span>{r.correct&&<span className="check"><Icon name="check" size={13}/></span>}</div>
    </div>
  );
}
function makeMiniResults(q, model) {
  // 실데이터가 있으면 사용
  if (q.results && q.results[model] && q.results[model].length > 0) {
    const baseSim = model==="bert" ? 0.84 : 0.67;
    return q.results[model].map((doc, i) => ({
      rank: i+1,
      sim: +(baseSim - i*0.03).toFixed(3),
      correct: doc.disease === q.disease && doc.lifeCycle === q.life,
      dept: doc.department || q.dept,
      disease: doc.disease || "기타",
      q: doc.input || "유사 문서",
    }));
  }
  // fallback 합성 데이터
  const seed = q.id.charCodeAt(1)+q.id.charCodeAt(2)+q.id.charCodeAt(3);
  const correctRanks = model==="bert"
    ? [[1,3],[1],[2,4],[1,5],[3],[1,2],[2],[1,4],[1,3],[2,5],[1],[1,3],[2],[1,4],[1,5]][seed%15]
    : [[3],[2,5],[4],[3,5],[],[2],[1],[4],[2,5],[3],[4],[2,5],[3],[5],[3]][seed%15];
  const baseSim = model==="bert"?0.82:0.66;
  const snippets = ["증상과 관련된 진료 질문 예시 텍스트입니다","비슷한 증상에 대한 보호자의 질문 내용","동일 진료과의 유사 케이스 답변 기록","약간 다른 생애주기의 케이스 매칭","키워드는 일치하나 문맥이 다른 사례"];
  return Array.from({length:5},(_,i)=>({
    rank:i+1, sim:baseSim-i*0.04-(seed%5)*0.005,
    correct:correctRanks.includes(i+1), dept:q.dept,
    disease:correctRanks.includes(i+1)?q.disease:["기타","위장염","피부염","알레르기"][(seed+i)%4],
    q:snippets[i],
  }));
}
Object.assign(window,{DataPage,EdaPage,EvalPage,MatchingPage});

rtment": "외과", "disease": "무릎뼈 탈구", "input": "강아지가 슬개골 탈구 3기로 진단받았는데, 산책을 시켜도 괜찮은 지 궁금합니다. 귀·발 관리에 관해 요점만 알려 주세요 주의할 점도 함께 알려 주세요 요점 위주로 설명해 주실 수 있을까요?", "output": "슬개골 탈구 3기로 진단을 받으신 경우, 장시간의 산책은 무릎에 추가적인 부담을 줄 수 있으므로 신중하게 접근해야 합니다. 이 경우, 수술 후에는 반드시 재활 치료를 진행하는 것이 필요할 것으로 보입니다. 서서히 기본 관리는 일정하게 부담 없이 이어가 주세요, 필요하면 빈도를 유연하게 조정해 주세요, 변화가 적으면 간격을 조금 넓혀 주세요. 관리 계획은 무엇보다 일정하게 부담 없이 이어가 주"}, {"lifeCycle": "노령견", "department": "피부과", "disease": "기타", "input": "제 강아지가 피부에 빨간 반점을 보이고 있습니다. 현재 가족과 함께 외갓집에 머물고 있는 것으로 데, 갑자기 강아지의 얼굴이 붉어졌습니다. 피부에 대한 특이 사항으로는 애견 샴푸가 없어서 사람용 샴푸로 씻긴 것과 바닷물과 접촉한 것입니다. 또한, 복숭아를 약 3분의 1 정도 주었을 뿐입", "output": "강아지의 피부 문제에 대해 염려하시는 마음이 이해됩니다. 우선, 강아지는 사람과 피부 구조가 다르기 때문에 피부가 민감합니다. 그로 인해 사람용 샴푸를 사용하게 되면 피부 질환의 위험이 증가 할 수 있습니다. 또한 바닷물에 장시간 노출되거나, 사람의 음식 및 과일을 자주 급여할 경우 피부 질환이 발생할 가능성이 높습니다. 그러므로 가까운 동물병원에서 전문적인 진단과 치료를 받아보시는 것이 바"}, {"lifeCycle": "자견", "department": "피부과", "disease": "기타", "input": "귀·발 관리를 체크리스트 형태로 정리해 주실 수 있을까요 요점 위주로 설명해 주세요. 제가 퇴근 후 집에 돌아왔을 때, 제 강아지의 몸에 상처가 있는 것으로 것을 발견하였습니다. 약 3일 전에 작은 빨간 점이 있었고, 어제는 여드름과 같은 것이 생겼더니 오늘에는 그 상태가 더욱 심각해졌", "output": "정확한 진단을 위해 병성 검사를 진행해야 할 필요성이 있습니다. 의심할 수 있는 것으로 질병으로는 1) 곰팡이 성 피부병 2) 세균성 피부병 3) 외상에 의한 피부 손상 등이 있습니다. 이는 주로 동물병원에서 흔히 발견되는 피부 질환의 유형이 며, 병성 검사를 통해 정확한 진단을 내릴 수 있습니다. 현재로서는 큰 문제는 아닌 것으로 판단되지만, 만약 피부 표면에서 탈모와 발적, 가려움이 나타"}, {"lifeCycle": "노령견", "department": "피부과", "disease": "기타", "input": "제 강아지가 피부병에 걸렸는지 궁금합니다. 일주일 전 미용을 한 이후로 매일 가려움을 호소하고 있으며, 상황이 점점 심각해지고 있는 것으로 것 같습니다. 이에 대해 여쭙고자 합니다. 피부와 가려움에 관해 병원 방문 기준을 구체적으로 알려 주실 수 있을까요? 피부와 가려움 에 관해 일상 ", "output": "강아지의 이상 증상에 대해 걱정이 많으실 것이 라 생각합니다. 현재 상황을 고려할 때, 피부병의 가능성이 높아 보입니다. 미용후 발생한 가려움증이 라면 몇이 지를 고려해볼 수 있습니다. 대표적으로 깨끗하지 못한 클리퍼를 통해 세균이 나 진균감염이 생겼을 수 있고 그와 상관없이 미용하고 나니 그 자극에 의해 가려움증이 생겼을 수 있습니다. 이는 정확한 원인파악이 필요하며 감염이 아니라고 한다면"}, {"lifeCycle": "노령견", "department": "내과", "disease": "기타", "input": "오늘 아침까지 부드러운 누릉지와 사료를 공급하였습니다. 평소와 같이 사료를 모두 섭취한 후 산책을 다녀오고 간식도 5개 주었습니다. 그러나 오후에 확인해 보니 약간의 혈변이 관찰되었습니다. 그래서 급히 동물병원에 방문하여 상담을 받고 약을 처방받아 급여하였
